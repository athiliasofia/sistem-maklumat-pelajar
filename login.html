<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Masuk</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<nav>
<div class="menu">
<a href="index.html">Utama</a>
<a href="register.html">Daftar</a>
<a href="login.html" class="active">Log Masuk</a>
<a href="search.html">Carian</a>
</div>
</nav>
</header>

<div class="container">
<div class="card">
<h2>Log Masuk</h2>

<div class="form-group">
<label for="username">Nama Pengguna (Username)</label>
<input
type="text"
id="username"
placeholder="Contoh: zainal123"
required>
<div class="error-text" id="usernameError"></div>
</div>

<div class="form-group">
<label for="email">Alamat Email</label>
<input
type="email"
id="email"
placeholder="Contoh: pelajar@sekolah.com"
required>
<div class="error-text" id="emailError"></div>
</div>

<button onclick="login()">Log Masuk</button>

<p id="mesej" class="message"></p>

</div>
</div>

<script src="js/api-config.js"></script>
<script src="js/validation.js"></script>
<script src="js/login.js"></script>
<script src="js/navigation.js"></script>

</body>
</html>
