<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<nav>
<div class="logo">Sistem Maklumat Pelajar</div>
<div class="menu">
<a href="index.html">Utama</a>
<a href="register.html" class="active">Daftar</a>
<a href="login.html">Log Masuk</a>
<a href="search.html">Carian</a>
</div>
</nav>
</header>

<div class="container">
<div class="card">
<h2>Pendaftaran Pengguna</h2>

<div class="form-group">
<label for="nama">Nama Lengkap</label>
<input
type="text"
id="nama"
placeholder="Contoh: Muhammad Zainal"
required>
<div class="error-text" id="namaError"></div>
</div>

<div class="form-group">
<label for="email">Alamat Email</label>
<input
type="email"
id="email"
placeholder="Contoh: pelajar@sekolah.com"
required>
<div class="error-text" id="emailError"></div>
</div>

<div class="form-group">
<label for="password">Kata Laluan</label>
<input
type="password"
id="password"
placeholder="Minimum 6 karakter"
required>
<div class="error-text" id="passwordError"></div>
</div>

<div class="form-group">
<label for="passwordConfirm">Sahkan Kata Laluan</label>
<input
type="password"
id="passwordConfirm"
placeholder="Ulang kata laluan"
required>
<div class="error-text" id="passwordConfirmError"></div>
</div>

<button onclick="daftar()">Daftar</button>

<p id="mesej" class="message"></p>

</div>
</div>

<script src="js/validation.js"></script>
<script src="js/register.js"></script>
<script src="js/navigation.js"></script>

</body>
</html>
